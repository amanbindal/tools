<html lang="en">

<head>
  <title>ER Data</title>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <h2>&nbspER Data &nbsp<span style="color: #DE3163;">BD</span>, <span style="color: #FFAC1C;">BU</span>,
      <span style="color: #6495ED;">TU</span>, <span style="color: #2AAA8A;">TD</span>
    </h2>
    <div style="display: flex; gap: 20px; align-items: center; margin-right: 60px;">
      <input type="text" id="searchInput" placeholder="Search Ticker..." style="padding: 8px 12px; border-radius: 6px; border: 1px solid var(--table-border); background: var(--table-bg); color: var(--text-color); outline: none;">
      <button id="themeToggle" class="theme-toggle" style="display: none;">🌙&nbsp☀️</button>
      <a href="ErMove.htm" target="_blank" style="text-decoration: none; color: #FFAC1C;">GT_100</a>
      <a href="ErMove100.htm" target="_blank" style="text-decoration: none; color: #6495ED;">LT_100</a>
    </div>
  </div>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--background-color);
      color: var(--text-color);
      transition: all 0.3s ease;
    }

    :root {
      --background-color: #f4f7f6;
      --text-color: #1a1a1a;
      --table-bg: #ffffff;
      --table-border: #e0e0e0;
      --header-bg: #2c3e50;
      --header-text: #ffffff;
      --row-hover: #f1f5f9;
    }

    [data-theme="dark"] {
      --background-color: #121212;
      --text-color: #e0e0e0;
      --table-bg: #1e1e1e;
      --table-border: #333333;
      --header-bg: #1f2937;
      --header-text: #f9fafb;
      --row-hover: #2d3748;
    }

    .light-theme {
      background-color: #ffffff;
      color: #000000;
    }

    .theme-toggle {
      position: fixed;
      margin-right: 8px;
      padding: 8px 8px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: transparent;
    }

    [data-theme="dark"] .theme-toggle span:first-child {
      display: none;
    }

    [data-theme="light"] .theme-toggle span:last-child {
      display: none;
    }

    th, td {
      padding: 12px 16px;
      text-align: right;
      border-bottom: 1px solid var(--table-border);
      transition: background-color 0.2s;
    }

    th {
      background-color: var(--header-bg);
      color: var(--header-text);
      font-weight: 600;
      white-space: nowrap;
    }

    /* Sticky Ticker Column */
    th:nth-child(1), td:nth-child(1) {
      text-align: left;
      position: sticky;
      left: 0;
      background-color: var(--table-bg);
      z-index: 1;
      border-right: 2px solid var(--table-border);
      box-shadow: 2px 0 5px rgba(0,0,0,0.05);
      font-weight: 600;
    }

    thead th:nth-child(1) {
      z-index: 3;
      background-color: var(--header-bg);
    }
    
    .light-theme th:nth-child(1) {
      background-color: #eee;
    }

    /* Left align Date */
    th:nth-child(2), td:nth-child(2) {
      text-align: left;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--table-bg);
    }
    
    tbody tr:hover {
      background-color: var(--row-hover);
    }

    .light-theme th {
      background-color: #eee;
      color: black;
    }

    .toggle-btn {
      padding: 10px;
      margin: 10px;
      cursor: pointer;
      border: none;
      background-color: #444;
      color: white;
    }

    .light-theme .toggle-btn {
      background-color: #ccc;
      color: black;
    }

    /* Use GPU acceleration for animations */
    .animated {
      transform: translateZ(0);
      will-change: transform;
    }

    /* Optimize table rendering */
    #table-wrapper {
      contain: content;
      height: 90vh;
      overflow-y: auto;
    }

    /* Prevent layout shifts */
    table {
      table-layout: fixed;
      width: 100%;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background-color: #333;
      color: white;
    }

    /* Column Grouping Dividers */
    .col-group-divider {
      border-right: 2px solid #555 !important;
    }

    .light-theme .col-group-divider {
      border-right: 2px solid #ccc !important;
    }
    
    td.col-group-divider {
      border-right: 2px solid var(--table-border) !important;
    }

    .light-theme thead th {
      background-color: #eee;
      color: black;
    }

    #earningsTable {
      max-height: 80vh;
      overflow-y: auto;
      width: 100%;
    }

    .highlight-green {
      background-color: #d6fbb1 !important;
    }

    .highlight-orange {
      background-color: #FFECB3 !important;
    }

    .highlight-red {
      background-color: #FFEBEE !important;
    }

    .highlight-blue {
      background-color: #cefcfd !important;
    }

    a,
    a label,
    a:link,
    a:visited,
    a:hover,
    a:active {
      cursor: pointer !important;
      text-decoration: none;
      color: inherit;
    }

    a:hover {
      text-decoration: underline !important;
    }

    td a,
    td a:link,
    td a:visited,
    td a:hover,
    td a:active {
      cursor: pointer !important;
    }

    .spinner-wrapper {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      display: none;
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .spinnerDone {
      width: 30px;
      height: 30px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #2AAA8A;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .row-selected {
      outline: 2px solid #1976d2 !important;
      background-color: #e3f2fd !important;
    }
  </style>
</head>

    function calculateRSI(closes, period = 14) {
      if (closes.length <= period) return null;

      let gains = 0;
      let losses = 0;

      // Initial average gain/loss
      for (let i = 1; i <= period; i++) {
        const delta = closes[i] - closes[i - 1];
        if (delta > 0) gains += delta;
        else losses -= delta;
      }

      let avgGain = gains / period;
      let avgLoss = losses / period;

      // Apply smoothing for the rest
      for (let i = period + 1; i < closes.length; i++) {
        const delta = closes[i] - closes[i - 1];
        const gain = delta > 0 ? delta : 0;
        const loss = delta < 0 ? -delta : 0;

        avgGain = (avgGain * (period - 1) + gain) / period;
        avgLoss = (avgLoss * (period - 1) + loss) / period;
      }

      const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
      const rsi = 100 - 100 / (1 + rs);
      return rsi;
    }

    function calculateMA10(closes) {
      if (!closes || closes.length < 10) return 0;
      const recent = closes.slice(-10);
      return recent.reduce((sum, price) => sum + price, 0) / 10;
    }

    function calculateMA50(closes) {
      if (!closes || closes.length < 50) return 0;
      const recent = closes.slice(-50);
      return recent.reduce((sum, price) => sum + price, 0) / 50;
    }

    function calculateMA200(closes) {
      if (!closes || closes.length < 200) return 0;
      const recent = closes.slice(-200);
      return recent.reduce((sum, price) => sum + price, 0) / 200;
    }

    async function fetchWithRetry(url, retries = 2, delay = 1000) {
      for (let i = 0; i < retries; i++) {
        try {
          const res = await fetch(url);
          if (res.status === 429 || res.status >= 500) throw new Error('Rate limit or server error');
          return await res.json().catch(() => ({}));
        } catch (err) {
          if (i === retries - 1) return {};
          await new Promise(res => setTimeout(res, delay + Math.random() * 500));
        }
      }
    }
    async function getYahooPrices(ticker) {
      try {
        const proxy = 'https://corsproxy.io/?';
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=3mo`;
        const data = await fetchWithRetry(proxy + encodeURIComponent(url));

        const result = data.chart.result[0];
        const timestamps = result.timestamp || [];
        const closes = result.indicators.quote[0].close || [];

        const paired = timestamps.map((ts, i) => ({ date: new Date(ts * 1000), close: closes[i] }))
          .filter(item => item.close != null)
          .sort((a, b) => a.date - b.date);

        const closesArr = paired.map(p => p.close);
        const rsi = calculateRSI(closesArr);
        const ma10 = calculateMA10(closesArr);

        return { rsi, ma10 };
      } catch (err) {
        console.error(`Error fetching ${ticker}:`, err);
        return { rsi: 0, ma10: 0 };
      }
    }

    

    
    

    

    async function fetchEarnings(ticker) {
      try {
        const [json, jsonPrice, jsonPrice2, jsonIvData, jsonInfo] = await Promise.all([
          fetchWithRetry(`https://phx.unusualwhales.com/api/companies_earnings/historic/${ticker}`),
          fetchWithRetry(`https://phx.unusualwhales.com/api/ticker/${ticker}/price/`),
          fetchWithRetry(`https://phx.unusualwhales.com/api/companies/${ticker}/get_historical_prices?limit=1`),
          fetchWithRetry(`https://phx.unusualwhales.com/api/volatility/${ticker}/stats`),
          fetchWithRetry(`https://phx.unusualwhales.com/api/companies/${ticker}/`)
        ]);

        // EMSE Filter: Market Cap > 1 Billion and 30-Day Volume > 1 Million
        if (!json.data || json.data.length === 0 || !jsonInfo.company || jsonInfo.company.marketcap < 1000000000 || jsonInfo.company.avg30_volume < 1000000)
          return null;

        var latest = json.data[json.data.length - 1];
        var next = latest;
        
        // Earnings date filter (er check) has been permanently removed as requested.

        // Fix: Use actual post_earnings_move_1d instead of expected_move_perc for historical realized moves
        const last4Quarters = json.data.slice(-5, -1); // Exclude the next earnings date

        // Calculate average absolute REALIZED move over last 4 quarters
        const avgHistoricRealizedMove = last4Quarters
          .map(q => Math.abs(parseFloat(q.post_earnings_move_1d) || 0))
          .filter(move => move > 0)
          .reduce((sum, move, i, arr) => sum + move / arr.length, 0);

        // Get historic REALIZED moves for the past 4 quarters (most recent first)
        const histMoves = last4Quarters.map(q => {
          const baseMove = parseFloat(q.post_earnings_move_1d) || 0;
          return (baseMove * 100).toFixed(2);
        }).reverse();

        if (!latest.post_earnings_move_3d && json.data.length > 1)
          latest = json.data[json.data.length - 2];

        const beta = jsonInfo.company ? parseFloat(jsonInfo.company.beta) || 0 : 0;
        const ma200 = parseFloat(jsonInfo.company.day200_moving_avg) || 0;
        const high52w = parseFloat(jsonInfo.company.week52_high) || 0;
        const industry = jsonInfo.company.industry_type || "";
        const marketcap = jsonInfo.company ? parseFloat(jsonInfo.company.marketcap) || 0 : 0;
        const ivRank = jsonIvData && jsonIvData.data ? parseFloat(jsonIvData.data.iv_rank) || 999 : 999;
        
        // Fetch external prices (Finnhub, Polygon, AlphaVantage) concurrently
        const latestPrice = parseFloat(jsonPrice.curr) || parseFloat(jsonPrice.prev) || (jsonPrice2.history && jsonPrice2.history.length > 0 ? parseFloat(jsonPrice2.history[0].price) || parseFloat(jsonPrice2.history[0].close_price) : 0);
        const preErPrice = parseFloat(latest.price) || 0;
        const priceChange = preErPrice ? ((latestPrice - preErPrice) / preErPrice * 100).toFixed(2) : 0;
        const mcp = preErPrice ? ((latestPrice - preErPrice) / preErPrice * 100).toFixed(2) : 0;
        
        const mcpAbs = latestPrice - preErPrice;
        const lastImpliedMoveAbs = preErPrice * parseFloat(latest.expected_move_perc || 0);

        const ucpAbs = preErPrice + 2 * lastImpliedMoveAbs;
        const ucpaAbs = preErPrice + lastImpliedMoveAbs;
        const lcpaAbs = preErPrice - lastImpliedMoveAbs;
        const lcpAbs = preErPrice - 2 * lastImpliedMoveAbs;

        const ucp = latestPrice ? ((ucpAbs - latestPrice) / latestPrice * 100).toFixed(2) : 0;
        const ucpa = latestPrice ? ((ucpaAbs - latestPrice) / latestPrice * 100).toFixed(2) : 0;
        const lcpa = latestPrice ? ((lcpaAbs - latestPrice) / latestPrice * 100).toFixed(2) : 0;
        const lcp = latestPrice ? ((lcpAbs - latestPrice) / latestPrice * 100).toFixed(2) : 0;

        const reportTime = next.report_time == 'unknown' || next.report_time == '' || !next.report_time ? '-' : next.report_time == 'premarket' ? 'PM' : next.report_time == 'postmarket' ? 'AH' : next.report_time;
        
        const ma50 = jsonInfo.company ? parseFloat(jsonInfo.company.day50_moving_avg) || 0 : 0;

        return {
          ticker: ticker,
          preErPrice: preErPrice || 0,
          price: latestPrice || 0,
          priceChange: priceChange || 0,
          mcp: mcp || 0,
          ucp: ucp,
          ucpa: ucpa,
          lcpa: lcpa,
          lcp: lcp,
          finvizSma200: null,
          er_date: next.report_date || 'N/A',
          report_date: latest.report_date || 'N/A',
          avgHistoricMove: avgHistoricRealizedMove * 100 || 0,
          straddle: toPercent(next.expected_move_perc) || 0,
          expected_move_perc: toPercent(latest.expected_move_perc) || 0,
          post_earnings_move_1d: toPercent(latest.post_earnings_move_1d) || 0,
          histMove1: histMoves[0] !== undefined ? histMoves[0] : null,
          histMove2: histMoves[1] !== undefined ? histMoves[1] : null,
          histMove3: histMoves[2] !== undefined ? histMoves[2] : null,
          histMove4: histMoves[3] !== undefined ? histMoves[3] : null,
          report_time: reportTime,
          iv_rank: ivRank,
          beta: beta,
          ma200: ma200,
          ma50: ma50,
          high52w: high52w,
          industry: industry,
          marketcap: marketcap
        };
      } catch (err) {
        console.error(`Error fetching ${ticker}:`, err);
        return null;
      }
    }

    function updatePriceCells(ticker, priceData, data) {
      const row = document.getElementById(`row-${ticker}`);
      if (!row) return;

      const price = data.price || 0;
      const ma10Ratio = priceData.ma10 ? ((price - priceData.ma10) / priceData.ma10) * 100 : 0;
      const ma50Ratio = data.ma50 ? ((price - data.ma50) / data.ma50) * 100 : 0;
      const ma200Ratio = data.ma200 ? ((price - data.ma200) / data.ma200) * 100 : 0;

      if(row.querySelector('.ma10')) row.querySelector('.ma10').innerHTML = `<span style="color:${ma10Ratio < 0 ? 'red' : 'green'}">${ma10Ratio.toFixed(2)}</span>`;
      if(row.querySelector('.ma50')) row.querySelector('.ma50').innerHTML = `<span style="color:${ma50Ratio < 0 ? 'red' : 'green'}">${ma50Ratio.toFixed(2)}</span>`;
      if(row.querySelector('.ma200')) row.querySelector('.ma200').innerHTML = `<a href="https://www.barchart.com/stocks/quotes/${ticker}/overview" target="_blank" style="color:${ma200Ratio < 0 ? 'red' : 'green'}">${ma200Ratio.toFixed(2)}</a>`;
      if(row.querySelector('.rsi')) row.querySelector('.rsi').textContent = priceData.rsi ? priceData.rsi.toFixed(2) : '-';
      
      const postErMove1d = data.post_earnings_move_1d;
      if (postErMove1d < 0) row.classList.add('highlight-red');
      if (postErMove1d > 0) row.classList.add('highlight-green');
    }

    

    // Utility to check if today is a new business day compared to cached date
    function isNewBusinessDay(lastDateStr) {
      if (!lastDateStr) return true;
      const lastDate = new Date(lastDateStr);
      const now = new Date();

      return (
        lastDate.getFullYear() !== now.getFullYear() ||
        lastDate.getMonth() !== now.getMonth() ||
        lastDate.getDate() !== now.getDate()
      );
    }

    // Cache helpers
    function getCache(key) {
      try {
        return JSON.parse(localStorage.getItem(key));
      } catch {
        return null;
      }
    }
    function setCache(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    // Wrap fetchEarnings with caching
    async function fetchEarningsCached(ticker) {
      const spinner = document.getElementById('loadingSpinner');
      const cacheKey = `Straddle_er_${ticker}`;
      const cached = getCache(cacheKey);

      if (cached && cached.data && cached.fetchedAt &&
        cached.data.histMove1 !== undefined &&
        !isNewBusinessDay(cached.fetchedAt)) {
        return cached.data;
      }

      spinner.style.display = 'block';
      try {
        const data = await fetchEarnings(ticker);
        if (data) {
          setCache(cacheKey, { data, fetchedAt: new Date().toISOString() });
        }
        return data;
      } finally {
        spinner.style.display = 'none';
        const spinnerDone = document.getElementById('doneSpinner');
        spinner.style.display = 'block';
      }
    }

    async function getPricesCached(ticker) {
      const spinner = document.getElementById('loadingSpinner');
      const cacheKey = `Straddle_$_${ticker}`;
      const cached = getCache(cacheKey);

      if (cached && cached.data && cached.fetchedAt &&
        !isNewBusinessDay(cached.fetchedAt)) {
        return cached.data;
      }

      spinner.style.display = 'block';
      try {
        const data = await getYahooPrices(ticker);
        if (data) {
          setCache(cacheKey, { data, fetchedAt: new Date().toISOString() });
        }
        return data;
      } finally {
        spinner.style.display = 'none';
      }
    }

    

    

    

    
    async function renderTable() {
      const spinner = document.getElementById('loadingSpinner');
      spinner.style.display = 'block';

      const tableBody = document.querySelector('#earningsTable tbody');
      tableBody.innerHTML = '';

      const CONCURRENCY_LIMIT = 10;
      let index = 0;

      function renderRowFromCache(ticker, data) {
        if (!data || !data.expected_move_perc || data.expected_move_perc == null) return;

        var straddleCalulated = parseFloat(data.straddle && data.straddle != "N/A" && data.straddle != 0 ? (parseFloat(data.straddle) + parseFloat(data.straddle) * 0.15).toFixed(2) : 0);
        var expMoveCalulated = parseFloat(data.expected_move_perc && data.expected_move_perc != 0 && data.expected_move_perc != 'N/A' ? (parseFloat(data.expected_move_perc) + parseFloat(data.expected_move_perc) * 0.15).toFixed(2) : 0);
        if (!data || !straddleCalulated)
          return;
        
        expMoveCalulated = parseFloat(expMoveCalulated && expMoveCalulated != "N/A" && expMoveCalulated != 0 ? expMoveCalulated : data.avgHistoricMove);
        var p = parseFloat((expMoveCalulated && straddleCalulated && expMoveCalulated > 0 && straddleCalulated > 0 ? parseFloat(((straddleCalulated - expMoveCalulated) / expMoveCalulated) * 100) : 999).toFixed(2));
        
        const row = `<tr id="row-${ticker}">
                    <td>${ticker}</td>
                    <td>${data.er_date}</td>
                    <td class="rsi col-group-divider">0</td>
                    <td>${parseFloat(data.iv_rank?.toFixed(2))}</td>
                    <td style="${data.beta && data.beta > 1.29 ? 'color:green;' : 'color:inherit;'}">${data.beta ? parseFloat(data.beta.toFixed(2)) : 0}</td>
                    <td>${data.report_time}</td>
                    <td class="col-group-divider">${p}</td>
                    <td style="${straddleCalulated > 0 && expMoveCalulated >= straddleCalulated ? 'color:green;' : 'color:red'}"><a href="https://unusualwhales.com/stock/${ticker}/earnings" target="_blank" style="color:inherit;">${straddleCalulated}</a></td>
                    <td>${data.histMove2 != null ? parseFloat(data.histMove2).toFixed(2) : '-'}</td>
                    <td>${data.histMove3 != null ? parseFloat(data.histMove3).toFixed(2) : '-'}</td>
                    <td>${data.histMove4 != null ? parseFloat(data.histMove4).toFixed(2) : '-'}</td>
                    <td class="col-group-divider">${parseFloat(data.post_earnings_move_1d && data.post_earnings_move_1d != 0 && data.post_earnings_move_1d != 'N/A' ? data.post_earnings_move_1d : 0)}</td>
                    <td class="priceChange"><a href="https://robinhood.com/stocks/${ticker}" target="_blank" style="color:inherit;">${parseFloat(data.priceChange)}</a></td>
                    <td class="mcp col-group-divider">${data.mcp}</td>
                    <td class="ucp">${data.ucp}</td>
                    <td class="ucpa">${data.ucpa}</td>
                    <td class="lcpa">${data.lcpa}</td>
                    <td class="lcp col-group-divider">${data.lcp}</td>
                    <td class="ma10">-</td>
                    <td class="ma50">-</td>
                    <td class="ma200 col-group-divider">-</td>
                    <td class="price"><a href="https://finviz.com/quote.ashx?t=${ticker}" target="_blank" style="color:inherit;}">${parseFloat(data.price?.toFixed(2))}</a></td>
                  </tr>`;
        tableBody.innerHTML += row;
        if (typeof enableRowHighlighting === "function") enableRowHighlighting();

        const priceCache = getCache(`Straddle_$_${ticker}`);
        if (
          priceCache &&
          priceCache.data &&
          priceCache.fetchedAt &&
          !isNewBusinessDay(priceCache.fetchedAt)
        ) {
          updatePriceCells(ticker, priceCache.data, data);
        } else {
          getPricesCached(ticker)
            .then(priceData => updatePriceCells(ticker, priceData, data))
            .catch(err => console.error(`Price error for ${ticker}:`, err));
        }
      }

      async function processBatch(batch) {
        const uncachedTickers = [];
        const cachedData = [];

        for (const ticker of batch) {
          const cacheKey = `Straddle_er_${ticker}`;
          const cached = getCache(cacheKey);
          if (
            cached &&
            cached.data &&
            cached.fetchedAt &&
            cached.data.histMove2 !== undefined &&
            !isNewBusinessDay(cached.fetchedAt)
          ) {
            cachedData.push({ ticker, data: cached.data });
          } else {
            uncachedTickers.push(ticker);
          }
        }

        for (const { ticker, data } of cachedData) {
          renderRowFromCache(ticker, data);
        }

        for (let i = 0; i < uncachedTickers.length; i += CONCURRENCY_LIMIT) {
          const subBatch = uncachedTickers.slice(i, i + CONCURRENCY_LIMIT);
          const earningsResults = await Promise.all(
            subBatch.map(ticker => fetchEarningsCached(ticker).catch(() => null))
          );

          for (let j = 0; j < subBatch.length; j++) {
            const ticker = subBatch[j];
            const data = earningsResults[j];
            renderRowFromCache(ticker, data);
          }
        }
      }

      try {
        tickers.sort((a, b) => {
          const cacheA = getCache(`Straddle_er_${a}`);
          const mcA = cacheA && cacheA.data && cacheA.data.marketcap ? cacheA.data.marketcap : 0;
          
          const cacheB = getCache(`Straddle_er_${b}`);
          const mcB = cacheB && cacheB.data && cacheB.data.marketcap ? cacheB.data.marketcap : 0;
          
          return mcB - mcA;
        });

        while (index < tickers.length) {
          const batch = tickers.slice(index, index + CONCURRENCY_LIMIT);
          await processBatch(batch);
          index += CONCURRENCY_LIMIT;
          await new Promise(res => setTimeout(res, 500));
        }

        sortTable(1);
      } finally {
        spinner.style.display = 'none';
      }
    }

    function sortTable(columnIndex, descending = false) {
      const table = document.getElementById("earningsTable");
      const tbody = table.tBodies[0];
      const rows = Array.from(tbody.rows);

      // Detect column type
      const isDate = columnIndex === 1; // ErDate(Nxt)
      const isNumeric = columnIndex !== 0 && columnIndex !== 1 && columnIndex !== 5;

      const sortedRows = rows.sort((a, b) => {
        const valA = a.cells[columnIndex].textContent.trim();
        const valB = b.cells[columnIndex].textContent.trim();

        if (isDate) {
          // Try to parse as date (supports formats like YYYY-MM-DD, MM/DD/YYYY, DD/MM/YYYY)
          const dateA = Date.parse(valA.replace(/(\d{2})\/(\d{2})\/(\d{4})/, '$3-$1-$2')) || Date.parse(valA);
          const dateB = Date.parse(valB.replace(/(\d{2})\/(\d{2})\/(\d{4})/, '$3-$1-$2')) || Date.parse(valB);
          return dateA - dateB;
        } else if (isNumeric) {
          const numA = parseFloat(valA.replace('%', ''));
          const numB = parseFloat(valB.replace('%', ''));
          const aIsNaN = isNaN(numA);
          const bIsNaN = isNaN(numB);
          if (aIsNaN && bIsNaN) return 0;
          if (aIsNaN) return 1; // Put invalid numbers (like '-') at the bottom
          if (bIsNaN) return -1;
          return numA - numB;
        } else {
          return valA.localeCompare(valB);
        }
      });

      if (descending || tbody.getAttribute('data-sorted') === `${columnIndex}-asc`) {
        sortedRows.reverse();
        tbody.setAttribute('data-sorted', `${columnIndex}-desc`);
      } else {
        tbody.setAttribute('data-sorted', `${columnIndex}-asc`);
      }

      tbody.innerHTML = '';
      sortedRows.forEach(row => tbody.appendChild(row));
    }

    // Search Filtering
    document.getElementById('searchInput').addEventListener('input', function(e) {
      const term = e.target.value.toLowerCase();
      const rows = document.querySelectorAll('#earningsTable tbody tr');
      rows.forEach(row => {
        const tickerCell = row.cells[0];
        if (tickerCell) {
          const ticker = tickerCell.textContent.toLowerCase();
          row.style.display = ticker.includes(term) ? '' : 'none';
        }
      });
    });

    renderTable();

  </script>
</body>
